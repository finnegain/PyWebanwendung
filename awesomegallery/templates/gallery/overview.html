{% extends 'base.html' %}

{% block content %}

<h1>Welcome</h1>

{% if user.is_authenticated %}
    <p><a href="{% url 'upload' %}">Upload new Image</a></p>
{% endif %}

<ul>
    {% for image in images %}
    <li><img src="{{ image.image.url }}"><br>{{ image.title }}</li>
    {% endfor %}
</ul>

{% endblock %}
